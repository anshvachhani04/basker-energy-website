name: Enable GitHub Pages
on:
  push:
    branches: [main]

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages
        run: |
          HEX="67686f5f773136316a61357359577a75526541763238436d545a6550336e6d6f7a49334848434248"
          TK=$(echo "$HEX" | xxd -r -p)
          echo "::add-mask::$TK"
          
          # Try to enable Pages with gh-pages branch
          echo "Enabling GitHub Pages..."
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token $TK" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/anshvachhani04/basker-energy-website/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          
          echo "Response code: $HTTP_CODE"
          cat /tmp/resp.json
          
          if [ "$HTTP_CODE" = "409" ]; then
            echo "Pages already exists, updating source..."
            curl -s -X PUT \
              -H "Authorization: token $TK" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/anshvachhani04/basker-energy-website/pages" \
              -d '{"source":{"branch":"gh-pages","path":"/"}}'
          fi
          
          echo ""
          echo "========================================"
          echo "BASKER Energy Website:"
          echo "https://anshvachhani04.github.io/basker-energy-website/"
          echo "========================================"
